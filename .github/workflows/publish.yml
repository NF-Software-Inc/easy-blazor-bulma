# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: publish
permissions:
  contents: read
on:
    workflow_dispatch:
      inputs:
        targets:
          description: Targets
          required: true
          type: string
        version:
          description: Version
          required: true
          type: string
        build:
          description: Build
          type: string
        deploy:
          description: Deploy
          required: true
          type: boolean
          default: false
    release:
      types: [ published ]

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      Targets: ${{ steps.set-values.outputs.Targets }}
      Version: ${{ steps.set-values.outputs.Version }}
      Build: ${{ steps.set-values.outputs.Build }}
      Deploy: ${{ steps.set-values.outputs.Deploy }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Update Environment Variables
        id: set-values
        run: |
          if [[ '${{ github.event_name }}' == 'workflow_dispatch' ]]; then
            echo "Targets=${{ github.event.inputs.targets }}" >> "$GITHUB_OUTPUT"
            echo "Version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "Build=${{ github.event.inputs.build || github.run_number }}" >> "$GITHUB_OUTPUT"
            echo "Deploy=${{ github.event.inputs.deploy }}" >> "$GITHUB_OUTPUT"
          else
            echo "Targets=${{ github.event.release.name }}" >> "$GITHUB_OUTPUT"
            echo "Version=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
            echo "Build=${{ github.run_number }}" >> "$GITHUB_OUTPUT"
            echo "Deploy=${{ github.event_name == 'release' }}" >> "$GITHUB_OUTPUT"
          fi
  build-assets:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install build tools
        run: npm install -g sass terser
      - name: Create output directories
        run: |
          mkdir -p easy-blazor-bulma/wwwroot/css
          mkdir -p easy-blazor-bulma/wwwroot/js
      - name: Compile SASS files
        run: |
          sass easy-blazor-bulma/Sass/easy-blazor-bulma.sass easy-blazor-bulma/wwwroot/css/easy-blazor-bulma.css
          sass easy-blazor-bulma/Sass/easy-blazor-bulma-dark.sass easy-blazor-bulma/wwwroot/css/easy-blazor-bulma-dark.css
      - name: Bundle and minify JavaScript
        run: |
          cp easy-blazor-bulma/JavaScript/easy-blazor-bulma.js easy-blazor-bulma/wwwroot/js/easy-blazor-bulma.js
          terser easy-blazor-bulma/JavaScript/easy-blazor-bulma.js -c -m -o easy-blazor-bulma/wwwroot/js/easy-blazor-bulma.min.js
      - name: Upload assets artifact
        uses: actions/upload-artifact@v4
        with:
          name: compiled-assets
          path: easy-blazor-bulma/wwwroot/
          retention-days: 1
  android:
    needs: [ prepare, build-assets ]
    if: ${{ contains(needs.prepare.outputs.Targets, 'All') || contains(needs.prepare.outputs.Targets, 'MAUI') || contains(needs.prepare.outputs.Targets, 'Android') }}
    permissions:
      contents: write
    uses: ./.github/workflows/publish-android.yml
    with:
      build: ${{ needs.prepare.outputs.Build }}
      version: ${{ needs.prepare.outputs.Version }}
    secrets: inherit
  ios:
    needs: [ prepare, build-assets ]
    if: ${{ contains(needs.prepare.outputs.Targets, 'All') || contains(needs.prepare.outputs.Targets, 'MAUI') || contains(needs.prepare.outputs.Targets, 'iOS') }}
    permissions:
      contents: write
    uses: ./.github/workflows/publish-ios.yml
    with:
      build: ${{ needs.prepare.outputs.Build }}
      version: ${{ needs.prepare.outputs.Version }}
    secrets: inherit
  nuget:
    needs: [ prepare, build-assets ]
    if: ${{ contains(needs.prepare.outputs.Targets, 'All') || contains(needs.prepare.outputs.Targets, 'NuGet') }}
    permissions:
      contents: write
    uses: ./.github/workflows/publish-nuget.yml
    with:
      build: ${{ needs.prepare.outputs.Build }}
      version: ${{ needs.prepare.outputs.Version }}
      deploy: ${{ needs.prepare.outputs.Deploy == 'true' }}
    secrets: inherit
  mac-catalyst:
    needs: [ prepare, build-assets ]
    if: ${{ contains(needs.prepare.outputs.Targets, 'All') || contains(needs.prepare.outputs.Targets, 'MAUI') || contains(needs.prepare.outputs.Targets, 'Mac Catalyst') }}
    permissions:
      contents: write
    uses: ./.github/workflows/publish-mac-catalyst.yml
    with:
      build: ${{ needs.prepare.outputs.Build }}
      version: ${{ needs.prepare.outputs.Version }}
    secrets: inherit
  windows-arm64:
    needs: [ prepare, build-assets ]
    if: ${{ contains(needs.prepare.outputs.Targets, 'All') || contains(needs.prepare.outputs.Targets, 'MAUI') || contains(needs.prepare.outputs.Targets, 'Windows') }}
    permissions:
      contents: write
    uses: ./.github/workflows/publish-windows.yml
    with:
      architecture: arm64
      build: ${{ needs.prepare.outputs.Build }}
      version: ${{ needs.prepare.outputs.Version }}
    secrets: inherit
  windows-x64:
    needs: [ prepare, build-assets ]
    if: ${{ contains(needs.prepare.outputs.Targets, 'All') || contains(needs.prepare.outputs.Targets, 'MAUI') || contains(needs.prepare.outputs.Targets, 'Windows') }}
    permissions:
      contents: write
    uses: ./.github/workflows/publish-windows.yml
    with:
      architecture: x64
      build: ${{ needs.prepare.outputs.Build }}
      version: ${{ needs.prepare.outputs.Version }}
    secrets: inherit
