# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: publish
permissions:
  contents: read
on:
    workflow_dispatch:
      inputs:
        targets:
          description: Targets
          required: true
          type: string
        version:
          description: Version
          required: true
          type: string
        build:
          description: Build
          type: string
        deploy:
          description: Deploy
          required: true
          type: boolean
          default: false
    release:
      types: [ published ]

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      Targets: ${{ steps.set-values.outputs.Targets }}
      Version: ${{ steps.set-values.outputs.Version }}
      Build: ${{ steps.set-values.outputs.Build }}
      Deploy: ${{ steps.set-values.outputs.Deploy }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Update Environment Variables
        id: set-values
        run: |
          if [[ '${{ github.event_name }}' == 'workflow_dispatch' ]]; then
            echo "Targets=${{ github.event.inputs.targets }}" >> "$GITHUB_OUTPUT"
            echo "Version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "Build=${{ github.event.inputs.build || github.run_number }}" >> "$GITHUB_OUTPUT"
            echo "Deploy=${{ github.event.inputs.deploy }}" >> "$GITHUB_OUTPUT"
          else
            echo "Targets=${{ github.event.release.name }}" >> "$GITHUB_OUTPUT"
            echo "Version=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
            echo "Build=${{ github.run_number }}" >> "$GITHUB_OUTPUT"
            echo "Deploy=${{ github.event_name == 'release' }}" >> "$GITHUB_OUTPUT"
          fi
  nuget:
    needs: [ prepare ]
    if: ${{ contains(needs.prepare.outputs.Targets, 'All') || contains(needs.prepare.outputs.Targets, 'NuGet') }}
    permissions:
      contents: write
    uses: ./.github/workflows/publish-nuget.yml
    with:
      build: ${{ needs.prepare.outputs.Build }}
      version: ${{ needs.prepare.outputs.Version }}
      deploy: ${{ needs.prepare.outputs.Deploy == 'true' }}
    secrets: inherit
  nuget-wait:
    needs: [ prepare, nuget ]
    if: always()
    permissions:
      contents: read
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Wait for NuGet package indexing
        run: |
          set -euo pipefail

          if [[ "${{ needs.prepare.outputs.Targets }}" != *"All"* && "${{ needs.prepare.outputs.Targets }}" != *"NuGet"* ]]; then
            echo "NuGet deployment not requested, skipping wait."
            exit 0
          fi

          echo "Waiting for package Easy.Blazor.Bulma version ${{ needs.prepare.outputs.Version }}"

          for i in {1..20}; do
            if curl -fsSL "https://api.nuget.org/v3-flatcontainer/Easy.Blazor.Bulma/index.json" | jq -e --arg version "${{ needs.prepare.outputs.Version }}" '.versions | index($version)' >/dev/null
            then
              echo "Package version ${{ needs.prepare.outputs.Version }} is available."
              exit 0
            fi

            echo "Attempt $i/20 - version not yet indexed."
            sleep 15
          done

          echo "Timed out waiting for version ${{ needs.prepare.outputs.Version }} to appear."
          exit 1
  android:
    needs: [ prepare, nuget-wait ]
    if: ${{ contains(needs.prepare.outputs.Targets, 'All') || contains(needs.prepare.outputs.Targets, 'MAUI') || contains(needs.prepare.outputs.Targets, 'Android') }}
    permissions:
      contents: write
    uses: ./.github/workflows/publish-android.yml
    with:
      build: ${{ needs.prepare.outputs.Build }}
      version: ${{ needs.prepare.outputs.Version }}
    secrets: inherit
  ios:
    needs: [ prepare, nuget-wait ]
    if: ${{ contains(needs.prepare.outputs.Targets, 'All') || contains(needs.prepare.outputs.Targets, 'MAUI') || contains(needs.prepare.outputs.Targets, 'iOS') }}
    permissions:
      contents: write
    uses: ./.github/workflows/publish-ios.yml
    with:
      build: ${{ needs.prepare.outputs.Build }}
      version: ${{ needs.prepare.outputs.Version }}
    secrets: inherit
  mac-catalyst:
    needs: [ prepare, nuget-wait ]
    if: ${{ contains(needs.prepare.outputs.Targets, 'All') || contains(needs.prepare.outputs.Targets, 'MAUI') || contains(needs.prepare.outputs.Targets, 'Mac Catalyst') }}
    permissions:
      contents: write
    uses: ./.github/workflows/publish-mac-catalyst.yml
    with:
      build: ${{ needs.prepare.outputs.Build }}
      version: ${{ needs.prepare.outputs.Version }}
    secrets: inherit
  windows-arm64:
    needs: [ prepare, nuget-wait ]
    if: ${{ contains(needs.prepare.outputs.Targets, 'All') || contains(needs.prepare.outputs.Targets, 'MAUI') || contains(needs.prepare.outputs.Targets, 'Windows') }}
    permissions:
      contents: write
    uses: ./.github/workflows/publish-windows.yml
    with:
      architecture: arm64
      build: ${{ needs.prepare.outputs.Build }}
      version: ${{ needs.prepare.outputs.Version }}
    secrets: inherit
  windows-x64:
    needs: [ prepare, nuget-wait ]
    if: ${{ contains(needs.prepare.outputs.Targets, 'All') || contains(needs.prepare.outputs.Targets, 'MAUI') || contains(needs.prepare.outputs.Targets, 'Windows') }}
    permissions:
      contents: write
    uses: ./.github/workflows/publish-windows.yml
    with:
      architecture: x64
      build: ${{ needs.prepare.outputs.Build }}
      version: ${{ needs.prepare.outputs.Version }}
    secrets: inherit
